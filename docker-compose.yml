services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tcgplayer
      POSTGRES_PASSWORD: tcgplayer
      POSTGRES_DB: tcgplayer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcgplayer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
